rules:
  - id: python-dangerous-eval-exec
    message: Avoid eval/exec; they can execute arbitrary code.
    severity: ERROR
    languages: [python]
    pattern-either:
      - pattern: eval(...)
      - pattern: exec(...)

  - id: python-subprocess-shell-true
    message: Avoid subprocess with shell=True; pass argv as a list instead.
    severity: ERROR
    languages: [python]
    patterns:
      - pattern-either:
          - pattern: subprocess.$FUNC(..., shell=True, ...)
          - pattern: subprocess.$FUNC(..., shell=True)

  - id: python-os-system
    message: Avoid os.system; use subprocess with argv list and check=True.
    severity: ERROR
    languages: [python]
    pattern: os.system(...)

  - id: python-pickle-load
    message: Avoid unsafe pickle loading of untrusted data.
    severity: ERROR
    languages: [python]
    pattern-either:
      - pattern: pickle.load(...)
      - pattern: pickle.loads(...)

  - id: hardcoded-gitlab-token-like-secret
    message: Possible hardcoded GitLab token. Read secrets from CI/CD variables instead.
    severity: ERROR
    languages: [generic]
    pattern-regex: '(?i)(gitlab|glpat|token|secret|password)[A-Za-z0-9_ -]{0,20}[=:][ ''"][A-Za-z0-9_\-]{12,}[ ''"]'
    paths:
      exclude:
        - token-rotate/test_gitlab_project_token_rotator.py
